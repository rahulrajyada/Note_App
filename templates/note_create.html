{% extends "base.html" %}

{% block content %}
<div class="card p-3">
  <h2>{% if note %}Edit Note{% else %}Create a New Note{% endif %}</h2>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label for="id_title" class="form-label">Title</label>
      {% if note %}
        <input id="id_title" name="title" class="form-control" value="{{ note.title }}">
      {% else %}
        <input id="id_title" name="title" class="form-control" value="{{ title|default:'' }}">
      {% endif %}
    </div>

    <div class="mb-3">
      <label for="id_content" class="form-label">Content</label>
      {% if note %}
        <textarea id="id_content" name="content" rows="8" class="form-control">{{ note.content }}</textarea>
      {% else %}
        <textarea id="id_content" name="content" rows="8" class="form-control">{{ content|default:'' }}</textarea>
      {% endif %}
    </div>

    <div class="mb-3">
      <label for="id_category" class="form-label">Category</label>
      {% if note %}
        <select id="id_category" name="category" class="form-select">
          <option value="work" {% if note.category == "work" %}selected{% endif %}>Work</option>
          <option value="personal" {% if note.category == "personal" %}selected{% endif %}>Personal</option>
          <option value="study" {% if note.category == "study" %}selected{% endif %}>Study</option>
          <option value="other" {% if note.category == "other" %}selected{% endif %}>Other</option>
        </select>
      {% else %}
        <select id="id_category" name="category" class="form-select">
          <option value="work" {% if category == "work" %}selected{% endif %}>Work</option>
          <option value="personal" {% if category == "personal" %}selected{% endif %}>Personal</option>
          <option value="study" {% if category == "study" %}selected{% endif %}>Study</option>
          <option value="other" {% if category == "other" or not category %}selected{% endif %}>Other</option>
        </select>
      {% endif %}
    </div>

    <button type="submit" class="btn btn-success">{% if note %}Save changes{% else %}Create{% endif %}</button>
    <a class="btn btn-secondary" href="{% url 'note_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
