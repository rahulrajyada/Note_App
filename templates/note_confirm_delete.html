{% extends "base.html" %}
{% block content %}
  <h3>Confirm delete</h3>
  <p>Are you sure you want to delete "{{ note.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'note_detail' note.id %}">Cancel</a>
  </form>
{% endblock %}
