{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Note App</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'note_list' %}">Note App</a>

          <div class="collapse navbar-collapse">
            <form class="d-flex ms-auto" role="search" method="get" action="{% url 'note_search' %}">
              <input class="form-control me-2" type="search" placeholder="Search" name="q" value="{{ request.GET.q }}">
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
          </div>

          <div class="d-flex ms-3">
            {% if user.is_authenticated %}
              <a class="btn btn-outline-primary me-2" href="{% url 'note_create' %}">Create Note</a>
              <span class="navbar-text me-2">Hi, {{ user.username }}</span>
              <a class="btn btn-outline-secondary" href="{% url 'logout' %}?next={% url 'note_list' %}">Logout</a>
            {% else %}
              <a class="btn btn-outline-primary" href="{% url 'login' %}?next={% url 'note_list' %}">Login</a>
            {% endif %}
          </div>
        </div>
      </nav>

      {% block content %}{% endblock %}

      <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    </div>
  </body>
</html>
